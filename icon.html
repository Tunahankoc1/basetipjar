<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Icon & Preview Oluşturucu</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 20px;
    }
    canvas {
      border-radius: 12px;
      border: 1px solid #333;
    }
    a.btn {
      display: inline-block;
      margin-top: 10px;
      background: #0052ff;
      color: #fff;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 600;
    }
    .block {
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Base Tip Jar - Icon &amp; Preview</h1>

  <div class="block">
    <h3>icon.png (200x200)</h3>
    <canvas id="iconCanvas" width="200" height="200"></canvas>
    <br />
    <a id="iconLink" class="btn" download="icon.png">Download icon.png</a>
  </div>

  <div class="block">
    <h3>preview.png (600x400)</h3>
    <canvas id="previewCanvas" width="600" height="400"></canvas>
    <br />
    <a id="previewLink" class="btn" download="preview.png">Download preview.png</a>
  </div>

  <script>
    function drawIcon(ctx, w, h) {
      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, '#0052ff');
      grad.addColorStop(1, '#001a66');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      ctx.font = Math.floor(h * 0.55) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🫙', w / 2, h / 2 + h * 0.03);
    }

    function drawPreview(ctx, w, h) {
      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, '#0052ff');
      grad.addColorStop(1, '#001a66');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      ctx.font = Math.floor(h * 0.4) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🫙', w / 2, h * 0.42);

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold ' + Math.floor(h * 0.09) + 'px sans-serif';
      ctx.fillText('Base Tip Jar', w / 2, h * 0.78);

      ctx.fillStyle = '#cdd8ff';
      ctx.font = Math.floor(h * 0.05) + 'px sans-serif';
      ctx.fillText('Send a tip on Base', w / 2, h * 0.88);
    }

    const iconCanvas = document.getElementById('iconCanvas');
    const previewCanvas = document.getElementById('previewCanvas');

    drawIcon(iconCanvas.getContext('2d'), 200, 200);
    drawPreview(previewCanvas.getContext('2d'), 600, 400);

    document.getElementById('iconLink').href = iconCanvas.toDataURL('image/png');
    document.getElementById('previewLink').href = previewCanvas.toDataURL('image/png');
  </script>
</body>
</html>
